<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helicopter Navigation Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #4CAF50;
            padding: 1em;
            text-align: center;
            color: white;
        }
        .container {
            display: flex;
            flex: 1;
            padding: 10px;
            flex-wrap: wrap;
        }
        .window {
            flex: 1;
            min-width: 300px;
            margin: 10px;
            background-color: #f4f4f4;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
        }
        .controls {
            flex: 1;
            min-width: 300px;
            margin: 10px;
            background-color: #f4f4f4;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
        }
        .mission-computer {
            flex: 1;
            min-width: 300px;
            margin: 10px;
            background-color: #f4f4f4;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Helicopter Navigation Simulator 20266</h1> 
    </header>
    <div class="container">
        <div class="window">
            <h2>Helicopter Window</h2>
            <p>[Display helicopter view here]</p>
        </div>
        <div class="mission-computer">
            <h2>Mission Computer</h2>
            <p>[Mission data and controls]</p>
        </div>
        <div class="controls">
            <h2>Flight Controls</h2>
            <p>[Flight control elements]</p>
        </div>
    </div>
</body>
</html>
